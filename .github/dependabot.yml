version: 2

updates:
  # npm dependencies
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: daily
    open-pull-requests-limit: 1
    reviewers:
      - Sillot
    labels:
      - dependencies
      - security
    groups:
      all-npm:
        patterns:
          - "*"

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: daily
    open-pull-requests-limit: 1
    reviewers:
      - Sillot
    labels:
      - dependencies
      - ci
    groups:
      all-actions:
        patterns:
          - "*"

  # Docker base image
  - package-ecosystem: docker
    directory: /
    schedule:
      interval: daily
    open-pull-requests-limit: 1
    reviewers:
      - Sillot
    labels:
      - dependencies
      - docker

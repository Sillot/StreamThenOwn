<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>StreamThenOwn — Options</title>
    <style>
      :root {
        color-scheme: dark;
      }
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: "Google Sans", Roboto, Arial, sans-serif;
        background: #1b1b1b;
        color: #e8eaed;
        padding: 32px;
        width: 520px;
      }
      h1 {
        font-size: 22px;
        font-weight: 500;
        margin-bottom: 4px;
      }
      .subtitle {
        font-size: 13px;
        color: #aaa;
        margin-bottom: 24px;
      }
      .store-list {
        display: flex;
        flex-direction: column;
        gap: 2px;
        background: #282828;
        border-radius: 8px;
        overflow: hidden;
      }
      .store-item {
        display: flex;
        align-items: center;
        gap: 14px;
        padding: 14px 16px;
        cursor: default;
        transition: background 0.1s;
        user-select: none;
      }
      .store-item:hover {
        background: rgba(255, 255, 255, 0.06);
      }
      .store-item.dragging {
        opacity: 0.4;
      }
      .store-item.drag-over {
        border-top: 2px solid #fff;
        padding-top: 12px;
      }
      .drag-handle {
        cursor: grab;
        color: #666;
        flex-shrink: 0;
        display: flex;
        align-items: center;
        padding: 4px 0;
        transition: color 0.1s;
      }
      .drag-handle:hover {
        color: #aaa;
      }
      .drag-handle:active {
        cursor: grabbing;
      }
      .store-item input[type="checkbox"] {
        appearance: none;
        -webkit-appearance: none;
        width: 18px;
        height: 18px;
        border: 2px solid #aaa;
        border-radius: 3px;
        background: transparent;
        cursor: pointer;
        flex-shrink: 0;
        position: relative;
      }
      .store-item input[type="checkbox"]:checked {
        background: #fff;
        border-color: #fff;
      }
      .store-item input[type="checkbox"]:checked::after {
        content: "";
        position: absolute;
        left: 4px;
        top: 1px;
        width: 5px;
        height: 9px;
        border: solid #1b1b1b;
        border-width: 0 2px 2px 0;
        transform: rotate(45deg);
      }
      .store-icon {
        width: 24px;
        height: 24px;
        flex-shrink: 0;
        filter: brightness(0) invert(0.9);
      }
      .store-info {
        display: flex;
        flex-direction: column;
        min-width: 0;
      }
      .store-name {
        font-size: 14px;
        font-weight: 500;
        color: #e8eaed;
      }
      .store-desc {
        font-size: 12px;
        color: #aaa;
        margin-top: 1px;
      }
      .saved {
        margin-top: 16px;
        font-size: 13px;
        color: #4caf50;
        opacity: 0;
        transition: opacity 0.2s;
      }
      .saved.visible {
        opacity: 1;
      }

      /* ---- Custom providers section ---- */
      .section-header {
        font-size: 16px;
        font-weight: 500;
        margin-top: 32px;
        margin-bottom: 4px;
      }
      .section-desc {
        font-size: 12px;
        color: #aaa;
        margin-bottom: 12px;
        line-height: 1.5;
      }
      .section-desc code {
        background: #333;
        padding: 1px 5px;
        border-radius: 3px;
        font-size: 11px;
        color: #e8eaed;
      }
      .custom-form {
        display: flex;
        flex-direction: column;
        gap: 8px;
        background: #282828;
        border-radius: 8px;
        padding: 16px;
        margin-bottom: 8px;
      }
      .custom-form input[type="text"],
      .custom-form input[type="url"] {
        background: #1b1b1b;
        border: 1px solid #444;
        border-radius: 4px;
        color: #e8eaed;
        padding: 8px 10px;
        font-size: 13px;
        font-family: inherit;
        width: 100%;
      }
      .custom-form input:focus {
        outline: none;
        border-color: #888;
      }
      .custom-form input::placeholder {
        color: #666;
      }
      .custom-form .form-row {
        display: flex;
        flex-direction: column;
        gap: 3px;
      }
      .custom-form label {
        font-size: 12px;
        color: #aaa;
      }
      .form-hint {
        font-size: 11px;
        color: #666;
        margin-top: 2px;
      }
      .form-hint code {
        background: #333;
        padding: 1px 5px;
        border-radius: 3px;
        font-size: 10px;
        color: #aaa;
      }
      .custom-form .form-error {
        font-size: 11px;
        color: #ef5350;
        min-height: 14px;
      }
      .btn {
        background: #fff;
        color: #1b1b1b;
        border: none;
        border-radius: 4px;
        padding: 8px 16px;
        font-size: 13px;
        font-weight: 500;
        cursor: pointer;
        align-self: flex-start;
        transition: opacity 0.1s;
      }
      .btn:hover {
        opacity: 0.85;
      }
      .btn:disabled {
        opacity: 0.4;
        cursor: default;
      }
      .btn-small {
        background: transparent;
        color: #aaa;
        border: none;
        cursor: pointer;
        padding: 4px;
        display: flex;
        align-items: center;
        transition: color 0.1s;
        flex-shrink: 0;
      }
      .btn-small:hover {
        color: #ef5350;
      }
      .custom-badge {
        font-size: 10px;
        background: #444;
        color: #ccc;
        padding: 1px 6px;
        border-radius: 3px;
        margin-left: 6px;
        vertical-align: middle;
      }
      .provider-count {
        font-size: 12px;
        color: #666;
        margin-left: 8px;
      }

      /* ---- About section ---- */
      .about-section {
        margin-top: 32px;
        padding-top: 24px;
        border-top: 1px solid #333;
      }
      .about-text {
        font-size: 12px;
        color: #aaa;
        line-height: 1.6;
        margin-top: 8px;
      }
      .about-text a {
        color: #8ab4f8;
        text-decoration: none;
      }
      .about-text a:hover {
        text-decoration: underline;
      }
      .about-affiliate {
        font-style: italic;
      }
      .about-version {
        color: #666;
        margin-top: 12px;
      }
    </style>
  </head>
  <body>
    <h1>StreamThenOwn</h1>
    <p class="subtitle" id="subtitle"></p>
    <div class="store-list" id="store-list"></div>

    <h2 class="section-header" id="custom-section-title"></h2>
    <p class="section-desc" id="custom-section-desc"></p>
    <div id="custom-form-container"></div>

    <p class="saved" id="saved">✓ Saved</p>

    <div class="about-section" id="about-section">
      <h2 class="section-header" id="about-title">About</h2>
      <p class="about-text" id="about-description"></p>
      <p class="about-text about-affiliate" id="about-affiliate"></p>
      <p class="about-text about-privacy" id="about-privacy"></p>
      <p class="about-text about-version" id="about-version"></p>
    </div>

    <script src="options/options.js"></script>
  </body>
</html>
